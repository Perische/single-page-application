<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly - Interactive Dictionary</title>
    <!-- Tailwind CSS CDN for modern, clean and responsive layout out-of-the-box -->
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    <header>
        <h1>Word Dictionary</h1>
        <p>search for words and discover examples, and synonyms</p>
    </header>

    <main>
        <!-- search section -->
    <section class="search-section">
            <form id="search-form">
              <label for="search-input">Search for a word:</label>  
                <input 
                type="text" 
                id="search-input"
                name="word"
                 placeholder="Enter a word..."
                 autocomplete="off"
                  required>
                <button 
                type="submit"
                id="search-btn">
                Search
            </button>
            </form>
        <!-- Loading message-->
            <div id="loading" class="loading hidden">
                <p>Loading...</p>
            </div>
    </section>
        <!-- Error Message-->
    <section>
         <div
          id="errorMessage" 
          class="error-message hidden"
          role ="alert"
          aria-live="assertive"
          >
        </div>

        <!-- Results Section -->
        <div id="results" class="results-section hidden">
            <h2 id="word"></h2>
        <!-- Pronunciation-->
        <div id="pronunciation" class="pronunciation-section">
            <h3>Pronunciation:</h3>
            <p id="phonetic"></p>
            <audio id="audio" controls>
                Your browser does not support the audio element.
            </audio>
        </div>
        
        <!--Definition-->
       <div id="definition" class="definition-section">
            <h3>Definition:</h3>
            <p id="partOfSpeech"></p>
            <div id="definition-text"></div>
            <p id="example"></p>
        </div>
        <!-- Synonyms-->
        <div id="synonyms" class="synonyms-section">
            <h3>Synonyms:</h3>
            <ul id="synonyms-list">
                <!-- Synonyms will be dynamically added here -->                 
        </ul>
        </div>
        <!-- source-->
        <div id="source-section" class="source-section hidden">
            <h3>Source:</h3>
            <a 
            id="source-link"
            href=""
            target="_blank"
            rel="noopener noreferrer">
            View Dictionary Source
        </a>
        </div> <!-- end source section -->
    </div><!--  End results-->
 <!-- Favorite Button -->
        <section class="favorite-section">
            <button
             type="button"
             id="favorite-btn">Add to Favorites</button>
            <h3>Favorites:</h3>
            <ul id="favorite-list">
                <!-- Favorite words will be dynamically added here -->
            </ul>
        </section>
  </section>     
 </main>
<footer>
    <p>&copy; 2026 Peris Wamweu. All rights reserved.</p>
</footer>
<script src="./js/index.js" defer></script>
</body>
</html>
